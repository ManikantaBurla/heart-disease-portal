<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical Diagnostics Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { medical: { 50: '#f0fdfa', 100: '#ccfbf1', 500: '#14b8a6', 600: '#0d9488', 900: '#134e4a' } }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 font-sans text-slate-800 antialiased py-10 px-4 sm:px-6 lg:px-8 border-t-8 border-medical-600">

    <div class="max-w-5xl mx-auto">
        
        <div class="flex justify-between items-center mb-8">
            <a href="/" class="inline-flex items-center text-sm font-medium text-slate-500 hover:text-medical-600 transition-colors">
                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Exit Terminal
            </a>
            
            <button type="button" onclick="fillSmartDefaults()" class="bg-emerald-100 text-emerald-700 hover:bg-emerald-200 hover:text-emerald-800 font-bold py-2 px-4 rounded-lg shadow-sm transition-colors text-sm flex items-center">
                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                Fill Smart Defaults
            </button>
        </div>

        {% if escalated %}
        <div class="bg-red-50 border-l-4 border-red-500 p-4 mb-8 rounded-r-lg shadow-sm">
            <div class="flex items-center">
                <svg class="w-6 h-6 text-red-500 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                <p class="text-sm text-red-700 font-semibold">
                    ESCALATION REQUIRED: Patient flagged in Stage 1 Screening with a {{ prev_risk }}% risk probability. Proceed with advanced metrics.
                </p>
            </div>
        </div>
        {% endif %}

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            
            <div class="bg-medical-50 px-8 py-8 border-b border-medical-100 flex items-center">
                <div class="w-14 h-14 bg-white text-medical-600 rounded-xl flex items-center justify-center shadow-sm mr-6">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                </div>
                <div>
                    <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">Deep Clinical Diagnostic Terminal</h1>
                    <p class="text-slate-500 text-sm mt-1">Enter precise laboratory and ECG metrics for Neural Network analysis.</p>
                </div>
            </div>

            <form action="/diagnose" method="POST" class="p-8">
                <input type="hidden" id="age" name="age" value="{{ age }}">
                <input type="hidden" id="sex" name="sex" value="{{ sex }}">

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    
                    <div class="flex flex-col">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Chest Pain Type</label>
                        <select id="cp" name="cp" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-medical-500 outline-none bg-white">
                            <option value="0">Typical Angina</option>
                            <option value="1">Atypical Angina</option>
                            <option value="2">Non-anginal Pain</option>
                            <option value="3">Asymptomatic</option>
                        </select>
                    </div>

                    <div class="flex flex-col">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Resting BP (mmHg)</label>
                        <input type="number" id="trestbps" name="trestbps" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-medical-500 outline-none">
                    </div>

                    <div class="flex flex-col">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Serum Chol (mg/dl)</label>
                        <input type="number" id="chol" name="chol" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-medical-500 outline-none">
                    </div>

                    <div class="flex flex-col">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Fasting Blood Sugar > 120?</label>
                        <select id="fbs" name="fbs" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-medical-500 outline-none bg-white">
                            <option value="0">False</option>
                            <option value="1">True</option>
                        </select>
                    </div>

                    <div class="flex flex-col">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Resting ECG (0-2)</label>
                        <select id="restecg" name="restecg" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-medical-500 outline-none bg-white">
                            <option value="0">Normal</option>
                            <option value="1">ST-T Wave Abnormality</option>
                            <option value="2">LV Hypertrophy</option>
                        </select>
                    </div>

                    <div class="flex flex-col">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Max Heart Rate</label>
                        <input type="number" id="thalach" name="thalach" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-medical-500 outline-none">
                    </div>

                    <div class="flex flex-col">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Exercise Angina?</label>
                        <select id="exang" name="exang" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-medical-500 outline-none bg-white">
                            <option value="0">No</option>
                            <option value="1">Yes</option>
                        </select>
                    </div>

                    <div class="flex flex-col">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">ST Depression</label>
                        <input type="number" step="0.1" id="oldpeak" name="oldpeak" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-medical-500 outline-none">
                    </div>

                    <div class="flex flex-col">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">ST Slope</label>
                        <select id="slope" name="slope" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-medical-500 outline-none bg-white">
                            <option value="2">Upsloping (Healthy)</option>
                            <option value="1">Flat</option>
                            <option value="0">Downsloping (Danger)</option>
                        </select>
                    </div>

                    <div class="flex flex-col">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Major Vessels (0-4)</label>
                        <input type="number" id="ca" name="ca" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-medical-500 outline-none">
                    </div>

                   <div class="flex flex-col md:col-span-2">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Thalium Test Result</label>
                        <select id="thal" name="thal" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-medical-500 outline-none bg-white">
                            <option value="2">Normal</option>
                            <option value="1">Fixed Defect</option>
                            <option value="3">Reversable Defect (Danger)</option>
                        </select>
                    </div>

                </div>

                <div class="mt-10">
                    <button type="submit" class="w-full bg-medical-600 hover:bg-medical-700 text-white font-bold py-4 px-8 rounded-xl shadow-md transition-transform transform hover:-translate-y-0.5 text-lg">
                        Run Stage 2 Neural Diagnostic
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function fillSmartDefaults() {
            document.getElementById('cp').value = "3";
            document.getElementById('trestbps').value = "120";
            document.getElementById('chol').value = "190";
            document.getElementById('fbs').value = "0";
            document.getElementById('restecg').value = "0";
            document.getElementById('thalach').value = "150";
            document.getElementById('exang').value = "0";
            document.getElementById('oldpeak').value = "0.0";
            document.getElementById('slope').value = "1";
            document.getElementById('ca').value = "0";
            document.getElementById('thal').value = "1";
        }
    </script>
</body>
</html>
