<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stage 1: Clinical Triage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { medical: { 50: '#f0fdfa', 100: '#ccfbf1', 500: '#14b8a6', 600: '#0d9488', 900: '#134e4a' } } } } }
    </script>
</head>
<body class="bg-slate-50 font-sans text-slate-800 antialiased py-10 px-4 sm:px-6 lg:px-8 border-t-8 border-medical-500">

    <div class="max-w-4xl mx-auto">
        
        <div class="flex justify-between items-center mb-8">
            <a href="/" class="inline-flex items-center text-sm font-medium text-slate-500 hover:text-medical-600 transition-colors">
                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Back to Portal
            </a>
            <button type="button" onclick="fillHighRisk()" class="bg-amber-100 text-amber-700 hover:bg-amber-200 font-bold py-2 px-4 rounded-lg shadow-sm text-sm">
                ⚡ Test: Fill High-Risk Vitals
            </button>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="bg-medical-50 px-8 py-8 border-b border-medical-100 flex items-center">
                <div class="w-14 h-14 bg-white text-medical-500 rounded-xl flex items-center justify-center shadow-sm mr-6">
                    <span class="text-2xl font-bold">1</span>
                </div>
                <div>
                    <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">Stage 1: General Triage</h1>
                    <p class="text-slate-500 text-sm mt-1">Basic clinical vitals and preliminary bloodwork (70k Dataset Model).</p>
                </div>
            </div>

            <form action="/triage_screen" method="POST" class="p-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    
                    <div class="flex flex-col">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Age (Years)</label>
                        <input type="number" id="age" name="age" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-medical-500 outline-none">
                    </div>

                    <div class="flex flex-col">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Sex</label>
                        <select id="gender" name="gender" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-medical-500 outline-none bg-white">
                            <option value="2">Male</option>
                            <option value="1">Female</option>
                        </select>
                    </div>

                    <div class="flex flex-col">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Height (cm)</label>
                        <input type="number" id="height" name="height" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-medical-500 outline-none">
                    </div>

                    <div class="flex flex-col">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Weight (kg)</label>
                        <input type="number" step="0.1" id="weight" name="weight" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-medical-500 outline-none">
                    </div>

                    <div class="flex flex-col">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Systolic BP (Upper)</label>
                        <input type="number" id="ap_hi" name="ap_hi" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-medical-500 outline-none">
                    </div>

                    <div class="flex flex-col">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Diastolic BP (Lower)</label>
                        <input type="number" id="ap_lo" name="ap_lo" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-medical-500 outline-none">
                    </div>

                    <div class="flex flex-col">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Total Cholesterol</label>
                        <select id="cholesterol" name="cholesterol" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-medical-500 outline-none bg-white">
                            <option value="1">Normal (< 200 mg/dL)</option>
                            <option value="2">Borderline (200 - 239 mg/dL)</option>
                            <option value="3">High Risk (240+ mg/dL)</option>
                        </select>
                    </div>

                    <div class="flex flex-col">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Fasting Glucose</label>
                        <select id="gluc" name="gluc" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-medical-500 outline-none bg-white">
                            <option value="1">Normal (< 100 mg/dL)</option>
                            <option value="2">Prediabetes (100 - 125 mg/dL)</option>
                            <option value="3">Diabetic (126+ mg/dL)</option>
                        </select>
                    </div>

                    <div class="flex flex-col">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Tobacco Use</label>
                        <select id="smoke" name="smoke" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-medical-500 outline-none bg-white">
                            <option value="0">Negative</option>
                            <option value="1">Positive</option>
                        </select>
                    </div>

                    <div class="flex flex-col">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Alcohol Use</label>
                        <select id="alco" name="alco" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-medical-500 outline-none bg-white">
                            <option value="0">Negative</option>
                            <option value="1">Positive</option>
                        </select>
                    </div>

                    <div class="flex flex-col md:col-span-2">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Physically Active?</label>
                        <select id="active" name="active" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-medical-500 outline-none bg-white">
                            <option value="1">Yes</option>
                            <option value="0">No</option>
                        </select>
                    </div>

                </div>

                <div class="mt-10">
                    <button type="submit" class="w-full bg-medical-500 hover:bg-medical-600 text-white font-bold py-4 px-8 rounded-xl shadow-md transition-transform transform hover:-translate-y-0.5 text-lg">
                        Run Initial Triage AI
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Fills bad numbers to guarantee the AI pushes the doctor to Stage 2
        function fillHighRisk() {
            document.getElementById('age').value = "65";
            document.getElementById('height').value = "170";
            document.getElementById('weight').value = "105";
            document.getElementById('ap_hi').value = "180";
            document.getElementById('ap_lo').value = "110";
            document.getElementById('cholesterol').value = "3";
            document.getElementById('gluc').value = "3";
            document.getElementById('smoke').value = "1";
            document.getElementById('alco').value = "1";
            document.getElementById('active').value = "0";
        }
    </script>
</body>
</html>
