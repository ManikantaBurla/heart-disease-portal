<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Wellness Check</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-800 antialiased py-10 px-4 sm:px-6 lg:px-8">

    <div class="max-w-3xl mx-auto">
        
        <a href="/" class="inline-flex items-center text-sm font-medium text-slate-500 hover:text-rose-600 transition-colors mb-8">
            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Back to Portal
        </a>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            
            <div class="bg-rose-50 px-8 py-10 border-b border-rose-100 text-center">
                <div class="w-16 h-16 bg-white text-rose-500 rounded-full flex items-center justify-center mx-auto mb-4 shadow-sm">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                </div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight mb-2">Community Wellness Check</h1>
                <p class="text-slate-600 max-w-xl mx-auto">
                    Answer these simple questions based on observable symptoms. No clinical lab reports are required.
                </p>
            </div>

            <form action="/commonman_screen" method="POST" class="p-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    
                    <div class="flex flex-col">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Age (Years)</label>
                        <input type="number" name="age" required placeholder="e.g. 50" class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-rose-500 focus:border-rose-500 outline-none transition-colors">
                    </div>

                    <div class="flex flex-col">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Sex</label>
                        <select name="gender" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-rose-500 focus:border-rose-500 outline-none transition-colors bg-white">
                            <option value="1">Female</option>
                            <option value="2">Male</option>
                        </select>
                    </div>

                    <div class="flex flex-col">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Height (cm)</label>
                        <input type="number" name="height" required placeholder="e.g. 165" class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-rose-500 focus:border-rose-500 outline-none transition-colors">
                    </div>

                    <div class="flex flex-col">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Weight (kg)</label>
                        <input type="number" step="0.1" name="weight" required placeholder="e.g. 70" class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-rose-500 focus:border-rose-500 outline-none transition-colors">
                    </div>

                    <div class="col-span-1 md:col-span-2 border-t border-slate-100 my-4"></div>

                    <div class="flex flex-col">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Frequent severe headaches or dizzy spells?</label>
                        <select name="headache" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-rose-500 focus:border-rose-500 outline-none transition-colors bg-white">
                            <option value="0">No</option>
                            <option value="1">Yes</option>
                        </select>
                    </div>

                    <div class="flex flex-col">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Unusual thirst or frequent urination?</label>
                        <select name="thirst" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-rose-500 focus:border-rose-500 outline-none transition-colors bg-white">
                            <option value="0">No</option>
                            <option value="1">Yes</option>
                        </select>
                    </div>

                    <div class="flex flex-col">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Does the person smoke tobacco?</label>
                        <select name="smoke" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-rose-500 focus:border-rose-500 outline-none transition-colors bg-white">
                            <option value="0">No</option>
                            <option value="1">Yes</option>
                        </select>
                    </div>

                    <div class="flex flex-col">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Does the person drink alcohol?</label>
                        <select name="alco" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-rose-500 focus:border-rose-500 outline-none transition-colors bg-white">
                            <option value="0">No</option>
                            <option value="1">Yes</option>
                        </select>
                    </div>

                    <div class="flex flex-col col-span-1 md:col-span-2">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Does the person do physical work daily?</label>
                        <select name="active" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-rose-500 focus:border-rose-500 outline-none transition-colors bg-white">
                            <option value="1">Yes</option>
                            <option value="0">No</option>
                        </select>
                    </div>

                </div>

                <div class="mt-10">
                    <button type="submit" class="w-full bg-rose-500 hover:bg-rose-600 text-white font-bold py-4 px-8 rounded-xl shadow-md transition-transform transform hover:-translate-y-0.5 text-lg">
                        Analyze Wellness Profile
                    </button>
                </div>
            </form>
            
        </div>
    </div>

</body>
</html>
